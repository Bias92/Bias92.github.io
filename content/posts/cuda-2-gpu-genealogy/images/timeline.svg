<svg viewBox="0 0 1560 560" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NVIDIA GPU architecture family tree, Tesla to Rubin</title>
  <desc>A timeline from Tesla (2006) through Fermi, Kepler, Maxwell, Pascal, then a fork at Volta (2017) into a datacenter line (Volta, Ampere, Hopper, Blackwell, Rubin) and a graphics line (Turing, Ada). Ampere and Blackwell ship on both lines.</desc>
  <style>text{font-family:'Roboto','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;}</style>
  <defs>
    <filter id="g" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.9" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1560" height="560" fill="#0d0e10"/>

  <!-- connections -->
  <g stroke="#2f8ba0" stroke-width="2" fill="none">
    <!-- trunk -->
    <path d="M128 290 L282 290"/><path d="M398 290 L432 290"/><path d="M548 290 L582 290"/><path d="M698 290 L732 290"/>
    <!-- fork from Pascal -->
    <path d="M848 290 C 890 290, 866 200, 866 177"/>
    <path d="M848 290 C 900 290, 938 380, 938 403"/>
    <!-- datacenter branch -->
    <path d="M924 150 L1016 150"/><path d="M1132 150 L1160 150"/><path d="M1276 150 L1304 150"/><path d="M1420 150 L1442 150"/>
    <!-- graphics branch -->
    <path d="M996 430 L1160 430"/>
  </g>
  <!-- both-line hint (Ampere/Blackwell also ship consumer) -->
  <g stroke="#4a5a62" stroke-width="1.4" stroke-dasharray="4 4" fill="none">
    <path d="M1074 177 L1074 250 L1218 250 L1218 403"/>
    <path d="M1362 177 L1362 340 L1218 340 L1218 403"/>
  </g>

  <!-- row labels -->
  <text x="866" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#5fcbe8">datacenter line</text>
  <text x="1078" y="490" text-anchor="middle" font-size="13" font-weight="700" fill="#7f9aa2">graphics line</text>
  <text x="70" y="240" text-anchor="middle" font-size="11" fill="#61666c">shared</text>

  <!-- nodes: trunk -->
  <g font-size="14" font-weight="700" text-anchor="middle">
    <g filter="url(#g)"><rect x="12" y="263" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="70" y="287" fill="#e6f6fb">Tesla</text><text x="70" y="306" font-size="11" font-weight="400" fill="#8fb2bd">2006</text>
    <g filter="url(#g)"><rect x="282" y="263" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="340" y="287" fill="#e6f6fb">Fermi</text><text x="340" y="306" font-size="11" font-weight="400" fill="#8fb2bd">2010</text>
    <g filter="url(#g)"><rect x="432" y="263" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="490" y="287" fill="#e6f6fb">Kepler</text><text x="490" y="306" font-size="11" font-weight="400" fill="#8fb2bd">2012</text>
    <g filter="url(#g)"><rect x="582" y="263" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="640" y="287" fill="#e6f6fb">Maxwell</text><text x="640" y="306" font-size="11" font-weight="400" fill="#8fb2bd">2014</text>
    <g filter="url(#g)"><rect x="732" y="263" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="790" y="287" fill="#e6f6fb">Pascal</text><text x="790" y="306" font-size="11" font-weight="400" fill="#8fb2bd">2016</text>
  </g>

  <!-- nodes: datacenter branch -->
  <g font-size="14" font-weight="700" text-anchor="middle">
    <g filter="url(#g)"><rect x="808" y="123" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="866" y="147" fill="#e6f6fb">Volta</text><text x="866" y="166" font-size="11" font-weight="400" fill="#8fb2bd">2017</text>
    <g filter="url(#g)"><rect x="1016" y="123" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="1074" y="147" fill="#e6f6fb">Ampere</text><text x="1074" y="166" font-size="11" font-weight="400" fill="#8fb2bd">2020</text>
    <g filter="url(#g)"><rect x="1160" y="123" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="1218" y="147" fill="#e6f6fb">Hopper</text><text x="1218" y="166" font-size="11" font-weight="400" fill="#8fb2bd">2022</text>
    <g filter="url(#g)"><rect x="1304" y="123" width="116" height="54" rx="8" fill="none" stroke="#33c0e4" stroke-width="1.7"/></g>
    <text x="1362" y="147" fill="#e6f6fb">Blackwell</text><text x="1362" y="166" font-size="11" font-weight="400" fill="#8fb2bd">2024</text>
    <g filter="url(#g)"><rect x="1442" y="123" width="116" height="54" rx="8" fill="none" stroke="#e46fd6" stroke-width="1.9"/></g>
    <text x="1500" y="147" fill="#f0a8e6">Rubin</text><text x="1500" y="166" font-size="11" font-weight="400" fill="#c98fc0">2026</text>
  </g>

  <!-- nodes: graphics branch -->
  <g font-size="14" font-weight="700" text-anchor="middle">
    <g filter="url(#g)"><rect x="880" y="403" width="116" height="54" rx="8" fill="none" stroke="#4a9fb4" stroke-width="1.6"/></g>
    <text x="938" y="427" fill="#cfe6ec">Turing</text><text x="938" y="446" font-size="11" font-weight="400" fill="#7f9aa2">2018</text>
    <g filter="url(#g)"><rect x="1160" y="403" width="116" height="54" rx="8" fill="none" stroke="#4a9fb4" stroke-width="1.6"/></g>
    <text x="1218" y="427" fill="#cfe6ec">Ada</text><text x="1218" y="446" font-size="11" font-weight="400" fill="#7f9aa2">2022</text>
  </g>

  <text x="780" y="536" text-anchor="middle" font-size="11.5" fill="#61666c">dashed: Ampere and Blackwell also ship consumer (graphics) parts. Rubin (magenta) is a rack-scale platform, not only a GPU.</text>
</svg>
