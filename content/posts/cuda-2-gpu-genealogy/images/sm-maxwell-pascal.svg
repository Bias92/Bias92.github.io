<svg viewBox="0 0 396 496" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Maxwell and Pascal SM component diagram</title>
<style>
text{font-family:'Roboto','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif}
.plateTitle{font-size:22px;font-weight:800;fill:#e6f6fb}.meta{font-size:13px;fill:#86a6b1}
.label{font-size:14px;font-weight:700;fill:#0d0e10}.darkLabel{font-size:13px;font-weight:700;fill:#d9f1f7}
.small{font-size:12px;fill:#d9f1f7}.tiny{font-size:10px;fill:#d9f1f7}.note{font-size:12px;fill:#8aaab4}
.outline{fill:#0d0e10;stroke:#33c0e4;stroke-width:2}.ic{fill:#75b7dc;stroke:#0d0e10;stroke-width:1.2}
.sched{fill:#ffa25a;stroke:#0d0e10;stroke-width:1.2}.reg{fill:#75b7dc;stroke:#0d0e10;stroke-width:1.2}
.core{fill:#2dcc35;stroke:#0d0e10;stroke-width:1}.ldst{fill:#b7db75;stroke:#0d0e10;stroke-width:1}
.sfu{fill:#8fd06b;stroke:#0d0e10;stroke-width:1}.tensor{fill:#e46fd6;stroke:#0d0e10;stroke-width:1.2}
.rt{fill:#ffe14f;stroke:#0d0e10;stroke-width:1.2}.tex{fill:#4d68b7;stroke:#0d0e10;stroke-width:1.2}
.mem{fill:#75b7dc;stroke:#0d0e10;stroke-width:1.2}.hot{fill:#e46fd6;stroke:#0d0e10;stroke-width:1.2}
.fabric{fill:#a9c0d5;stroke:#0d0e10;stroke-width:1.2}.arrow{fill:#a9b0b4}
</style>
<defs>
<filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="1.6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="0.8" fill="#1b2a30"/></pattern>
</defs>
<rect width="396" height="496" fill="#0d0e10"/><rect width="396" height="496" fill="url(#dots)" opacity="0.32"/>
  <g transform="translate(20 20)" filter="url(#glow)">
    <rect width="356" height="456" rx="12" class="outline"/>
    <text x="22" y="34" class="plateTitle">Maxwell / Pascal</text><text x="202" y="34" class="meta">consumer · 2014-2016</text>
    <rect x="22" y="58" width="312" height="28" class="ic"/><text x="178" y="77" text-anchor="middle" class="label">Instruction cache</text>
    <rect x="22" y="100" width="312" height="40" class="reg"/><text x="178" y="125" text-anchor="middle" class="label">Partitioned register file</text>
    <g transform="translate(22 164)">
      <rect width="144" height="82" class="hot"/><rect x="168" width="144" height="82" class="hot"/>
      <rect y="106" width="144" height="82" class="hot"/><rect x="168" y="106" width="144" height="82" class="hot"/>
      <text x="72" y="24" text-anchor="middle" class="label">scheduler</text><text x="72" y="46" text-anchor="middle" class="label">32 cores</text><text x="72" y="68" text-anchor="middle" class="label">RF slice</text>
      <text x="240" y="24" text-anchor="middle" class="label">scheduler</text><text x="240" y="46" text-anchor="middle" class="label">32 cores</text><text x="240" y="68" text-anchor="middle" class="label">RF slice</text>
      <text x="72" y="130" text-anchor="middle" class="label">scheduler</text><text x="72" y="152" text-anchor="middle" class="label">32 cores</text><text x="72" y="174" text-anchor="middle" class="label">RF slice</text>
      <text x="240" y="130" text-anchor="middle" class="label">scheduler</text><text x="240" y="152" text-anchor="middle" class="label">32 cores</text><text x="240" y="174" text-anchor="middle" class="label">RF slice</text>
    </g>
    <rect x="22" y="382" width="148" height="28" class="mem"/><text x="96" y="401" text-anchor="middle" class="label">shared / L1</text>
    <rect x="186" y="382" width="148" height="28" class="tex"/><text x="260" y="402" text-anchor="middle" font-size="18" fill="#fff">TEX</text>
    <text x="22" y="438" class="note">Datacenter Pascal GP100 differs: FP64, HBM2, NVLink.</text>
  </g>

</svg>
