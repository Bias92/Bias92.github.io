<svg viewBox="0 0 1440 900" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>NVIDIA architecture snapshots, Tesla to Rubin</title>
  <desc>Compact one-card-per-generation genealogy from Tesla to Rubin. Each card names the generation, line, and defining architectural change.</desc>
  <style>
    text{font-family:'Roboto','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif}
    .title{fill:#e5f7fb;font-size:34px;font-weight:800}
    .sub{fill:#86a7b2;font-size:17px}
    .cardTitle{fill:#dff5fb;font-size:20px;font-weight:800}
    .year{fill:#83a7b2;font-size:13px}
    .body{fill:#b8d5dd;font-size:14px}
    .hot{fill:#f3afe9;font-size:14px;font-weight:700}
    .line{stroke:#33c0e4;stroke-width:2.2;fill:none}
    .branch{stroke:#e46fd6;stroke-width:2.2;fill:none;stroke-dasharray:9 9}
  </style>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.1" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="cardFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10161a"/>
      <stop offset="1" stop-color="#0d0e10"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="900" fill="#0d0e10"/>
  <text x="58" y="64" class="title">NVIDIA GPU Architecture Genealogy</text>
  <text x="58" y="94" class="sub">Tesla to Rubin: same SIMT mental model, more specialized units, bigger system boundary.</text>

  <path d="M178 196 H1262" class="line" filter="url(#glow)"/>
  <path d="M674 196 C700 250 700 282 674 338" class="branch" filter="url(#glow)"/>
  <rect x="654" y="306" width="486" height="34" rx="7" fill="#0d0e10" stroke="#e46fd6" stroke-width="1.1" opacity="0.92"/>
  <text x="672" y="328" class="hot">Volta fork: datacenter AI and RTX graphics diverge</text>

  <!-- shared trunk -->
  <g transform="translate(58 128)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Tesla</text><text x="20" y="58" class="year">2006 · G80</text>
    <text x="20" y="88" class="body">Unified shader</text>
    <text x="20" y="112" class="body">SIMT + CUDA origin</text>
    <text x="20" y="136" class="hot">8 SP / SM</text>
  </g>
  <g transform="translate(278 128)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Fermi</text><text x="20" y="58" class="year">2010 · GF100</text>
    <text x="20" y="88" class="body">Compute-first SM</text>
    <text x="20" y="112" class="hot">L1 data cache</text>
    <text x="20" y="136" class="body">FP64, FMA, ECC</text>
  </g>
  <g transform="translate(498 128)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Kepler</text><text x="20" y="58" class="year">2012 · GK110</text>
    <text x="20" y="88" class="body">Wide SMX</text>
    <text x="20" y="112" class="hot">192 cores / SMX</text>
    <text x="20" y="136" class="body">compiler scheduling</text>
  </g>
  <g transform="translate(718 128)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Maxwell</text><text x="20" y="58" class="year">2014 · GM200</text>
    <text x="20" y="88" class="body">Efficiency correction</text>
    <text x="20" y="112" class="hot">4 x 32 partitions</text>
    <text x="20" y="136" class="body">clean warp mapping</text>
  </g>
  <g transform="translate(938 128)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Pascal</text><text x="20" y="58" class="year">2016 · GP100/102</text>
    <text x="20" y="88" class="body">Branch begins</text>
    <text x="20" y="112" class="hot">HBM2 + NVLink</text>
    <text x="20" y="136" class="body">GP100 differs</text>
  </g>

  <!-- datacenter line -->
  <text x="58" y="350" class="sub">Datacenter / AI line</text>
  <path d="M178 392 H1262" class="line" filter="url(#glow)"/>
  <g transform="translate(58 420)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#e46fd6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Volta</text><text x="20" y="58" class="year">2017 · GV100</text>
    <text x="20" y="88" class="hot">1st Tensor Core</text>
    <text x="20" y="112" class="body">independent thread</text>
    <text x="20" y="136" class="body">scheduling</text>
  </g>
  <g transform="translate(278 420)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#e46fd6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Ampere</text><text x="20" y="58" class="year">2020 · GA100</text>
    <text x="20" y="88" class="hot">TF32 + sparsity</text>
    <text x="20" y="112" class="body">cp.async feeds SMEM</text>
    <text x="20" y="136" class="body">MIG isolation</text>
  </g>
  <g transform="translate(498 420)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#e46fd6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Hopper</text><text x="20" y="58" class="year">2022 · GH100</text>
    <text x="20" y="88" class="hot">FP8 Transformer</text>
    <text x="20" y="112" class="body">TMA, wgmma</text>
    <text x="20" y="136" class="body">thread block cluster</text>
  </g>
  <g transform="translate(718 420)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#e46fd6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Blackwell</text><text x="20" y="58" class="year">2024 · B200</text>
    <text x="20" y="88" class="hot">FP4 + TMEM</text>
    <text x="20" y="112" class="body">2 reticle dies</text>
    <text x="20" y="136" class="body">NVLink 5 fabric</text>
  </g>
  <g transform="translate(938 420)">
    <rect width="190" height="148" rx="10" fill="url(#cardFill)" stroke="#e46fd6" stroke-width="1.8" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Rubin</text><text x="20" y="58" class="year">2026 · platform</text>
    <text x="20" y="88" class="hot">HBM4 + NVLink 6</text>
    <text x="20" y="112" class="body">72 GPU NVL72</text>
    <text x="20" y="136" class="body">rack is the unit</text>
  </g>

  <!-- graphics line -->
  <text x="58" y="642" class="sub">Graphics / RTX line</text>
  <path d="M178 684 H862" class="line" filter="url(#glow)"/>
  <g transform="translate(58 710)">
    <rect width="190" height="132" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Turing</text><text x="20" y="58" class="year">2018 · TU102</text>
    <text x="20" y="88" class="hot">RT Core arrives</text>
    <text x="20" y="112" class="body">2nd Tensor to RTX</text>
  </g>
  <g transform="translate(278 710)">
    <rect width="190" height="132" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Ampere RTX</text><text x="20" y="58" class="year">2020 · GA10x</text>
    <text x="20" y="88" class="hot">128 FP32 lanes</text>
    <text x="20" y="112" class="body">2nd RT, GDDR6X</text>
  </g>
  <g transform="translate(498 710)">
    <rect width="190" height="132" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Ada</text><text x="20" y="58" class="year">2022 · AD102</text>
    <text x="20" y="88" class="hot">SER + DLSS 3</text>
    <text x="20" y="112" class="body">3rd RT, 4th Tensor</text>
  </g>
  <g transform="translate(718 710)">
    <rect width="190" height="132" rx="10" fill="url(#cardFill)" stroke="#33c0e4" stroke-width="1.7" filter="url(#glow)"/>
    <text x="20" y="36" class="cardTitle">Blackwell RTX</text><text x="20" y="58" class="year">2025 · GB202</text>
    <text x="20" y="88" class="hot">GDDR7 + FP4</text>
    <text x="20" y="112" class="body">scale over cleverness</text>
  </g>

  <text x="1020" y="796" fill="#83a7b2" font-size="15">Read the line as:</text>
  <text x="1020" y="824" fill="#dff5fb" font-size="17" font-weight="700">graphics -> compute -> AI -> system</text>
</svg>
