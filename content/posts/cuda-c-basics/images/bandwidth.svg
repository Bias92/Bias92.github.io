<svg viewBox="0 0 720 368" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Memory bandwidth: interconnect vs on-device HBM</title>
  <desc>Host-device interconnects (PCIe Gen4 32, Gen5 64 GB/s per direction; NVLink 900 GB/s aggregate, GPU-to-GPU only) versus on-device HBM (A100 SXM 2000, H100 SXM 3350 GB/s). On-device HBM is roughly 30 to 100 times faster than the PCIe host link, which is why host-device transfer is the dominant bottleneck.</desc>
  <style>text{font-family:'Roboto','Noto Sans KR',-apple-system,BlinkMacSystemFont,sans-serif;}</style>
  <defs>
    <filter id="glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="3.6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="gTeal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1c6f88" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#40cdef" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="gSteel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#464f55" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#93a3aa" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <rect width="720" height="368" fill="#0d0e10"/>

  <text x="26" y="38" fill="#eaf6fa" font-size="17" font-weight="700">Memory bandwidth <tspan fill="#5fcbe8">(GB/s)</tspan></text>
  <text x="26" y="58" fill="#7f858c" font-size="12">host↔device interconnect vs on-device HBM</text>

  <!-- gridlines -->
  <g stroke="#191d21" stroke-width="1">
    <line x1="200" y1="78" x2="200" y2="270"/>
    <line x1="330" y1="78" x2="330" y2="270"/>
    <line x1="460" y1="78" x2="460" y2="270"/>
    <line x1="590" y1="78" x2="590" y2="270"/>
  </g>
  <g fill="#4f545b" font-size="10" text-anchor="middle">
    <text x="200" y="286">0</text><text x="330" y="286">1000</text>
    <text x="460" y="286">2000</text><text x="590" y="286">3000</text>
  </g>

  <!-- interconnect (dim steel, glowing) -->
  <g filter="url(#glow)">
    <rect x="200" y="84" width="5" height="22" rx="11" fill="url(#gSteel)" stroke="#93a3aa" stroke-width="1.4"/>
    <rect x="200" y="122" width="9" height="22" rx="11" fill="url(#gSteel)" stroke="#93a3aa" stroke-width="1.4"/>
    <rect x="200" y="160" width="117" height="22" rx="11" fill="url(#gSteel)" stroke="#93a3aa" stroke-width="1.5"/>
  </g>
  <!-- on-device HBM (electric cyan, strong glow) -->
  <g filter="url(#glow)">
    <rect x="200" y="200" width="260" height="22" rx="11" fill="url(#gTeal)" stroke="#40cdef" stroke-width="1.9"/>
    <rect x="200" y="238" width="435" height="22" rx="11" fill="url(#gTeal)" stroke="#4ad4f5" stroke-width="2.1"/>
  </g>

  <!-- gap callout -->
  <line x1="200" y1="191" x2="680" y2="191" stroke="#2a3037" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="680" y="186" font-size="10.5" text-anchor="end" fill="#5fcbe8">on-device ↓  ~30-100x the PCIe host link</text>

  <!-- row labels -->
  <g font-size="12.5" text-anchor="end" fill="#c8ccd0">
    <text x="192" y="99">PCIe Gen4 x16</text>
    <text x="192" y="137">PCIe Gen5 x16</text>
    <text x="192" y="175">NVLink (H100)</text>
    <text x="192" y="215">HBM (A100 SXM)</text>
    <text x="192" y="253">HBM (H100 SXM)</text>
  </g>
  <!-- value labels -->
  <g font-size="11.5" font-weight="600">
    <text x="213" y="99" fill="#aeb4b9">32</text>
    <text x="217" y="137" fill="#aeb4b9">64</text>
    <text x="325" y="175" fill="#aeb4b9">900</text>
    <text x="468" y="215" fill="#7fe0f7">2000</text>
    <text x="643" y="253" fill="#7fe0f7">3350</text>
  </g>

  <!-- legend -->
  <g font-size="11">
    <rect x="200" y="312" width="22" height="10" rx="5" fill="url(#gSteel)" stroke="#93a3aa" stroke-width="1.2"/>
    <text x="230" y="321" fill="#9aa0a6">interconnect (host link)</text>
    <rect x="410" y="312" width="22" height="10" rx="5" fill="url(#gTeal)" stroke="#40cdef" stroke-width="1.4"/>
    <text x="440" y="321" fill="#9aa0a6">on-device (HBM)</text>
  </g>
  <!-- footnote: NVLink topology caveat (reviewer #2) -->
  <text x="200" y="352" font-size="9.5" fill="#61666c">NVLink 900 is aggregate GPU↔GPU (NVLink/NVSwitch); the default host↔device path is PCIe.</text>
</svg>
