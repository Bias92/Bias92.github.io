<svg width="720" height="300" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrT" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto">
      <path d="M1 1L9 5L1 9Z" fill="#33c0e4"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="720" height="300" rx="12" fill="#0d0e10" stroke="#22323a"/>

  <text x="190" y="34" font-size="14.5" fill="#9fdcec" font-weight="600" text-anchor="middle">naive</text>
  <text x="530" y="34" font-size="14.5" fill="#9fdcec" font-weight="600" text-anchor="middle">tiled T=32</text>

  <!-- naive column -->
  <rect x="50" y="50" width="280" height="34" rx="6" fill="#0f1319" stroke="#33c0e4" stroke-width="1.5"/>
  <text x="190" y="72" font-size="12" fill="#9fdcec" text-anchor="middle">thread requests · 68.7 GB</text>

  <line x1="90" y1="84" x2="90" y2="118" stroke="#33c0e4" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="106" y="106" font-size="10.5" fill="#8fb2bd">warp coalescing + broadcast: ÷2</text>

  <rect x="110" y="122" width="160" height="34" rx="6" fill="#0f1319" stroke="#33c0e4" stroke-width="1.5"/>
  <text x="190" y="144" font-size="12" fill="#9fdcec" text-anchor="middle">sectors · 34.4 GB</text>

  <line x1="130" y1="156" x2="130" y2="190" stroke="#33c0e4" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="146" y="178" font-size="10.5" fill="#8fb2bd">L2 absorbs more than 99.5%</text>

  <rect x="165" y="194" width="50" height="34" rx="6" fill="#2b1229" stroke="#e46fd6" stroke-width="1.5"/>
  <text x="225" y="216" font-size="11.5" fill="#e46fd6">DRAM · 0.08~0.15 GB</text>

  <!-- tiled column -->
  <rect x="450" y="50" width="160" height="34" rx="6" fill="#0f1319" stroke="#33c0e4" stroke-width="1.5"/>
  <text x="530" y="72" font-size="12" fill="#9fdcec" text-anchor="middle">thread requests · 2.15 GB</text>

  <line x1="470" y1="84" x2="470" y2="118" stroke="#33c0e4" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="486" y="106" font-size="10.5" fill="#8fb2bd">no overfetch: requested bytes = sector bytes</text>

  <rect x="450" y="122" width="160" height="34" rx="6" fill="#0f1319" stroke="#33c0e4" stroke-width="1.5"/>
  <text x="530" y="144" font-size="12" fill="#9fdcec" text-anchor="middle">sectors · 2.15 GB</text>

  <line x1="470" y1="156" x2="470" y2="190" stroke="#33c0e4" stroke-width="1.5" marker-end="url(#arrT)"/>
  <text x="486" y="178" font-size="10.5" fill="#8fb2bd">L2 absorbs most of it</text>

  <rect x="505" y="194" width="50" height="34" rx="6" fill="#2b1229" stroke="#e46fd6" stroke-width="1.5"/>
  <text x="565" y="216" font-size="11.5" fill="#e46fd6">DRAM · 0.06~0.10 GB</text>

  <text x="360" y="272" font-size="12" fill="#8fb2bd" text-anchor="middle">GEMM N = 2048, measured traffic at each layer. Box widths not to scale.</text>
</svg>
