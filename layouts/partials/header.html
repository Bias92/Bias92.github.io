{{- $currentPage := . }}
<header class="sb-header">
    <nav class="sb-nav">
        <a href="{{ "" | absLangURL }}" accesskey="h" title="{{ .Site.Title }}" class="sb-logo">
            {{- .Site.Title -}}
        </a>

        <div class="sb-nav-right">
            <div class="sb-meta" aria-label="Clock and weather">
                <span class="sb-clock" id="sb-clock" title="Current time">--:--</span>
                <span class="sb-weather" id="sb-weather" title="Weather">
                    <span class="sb-weather-icon">·</span>
                    <span class="sb-weather-city">--</span>
                    <span class="sb-weather-temp">--°</span>
                </span>
            </div>

            {{- if (not .Site.Params.disableThemeToggle) }}
            <button id="theme-toggle" class="sb-theme-toggle" accesskey="t" title="Toggle theme" aria-label="Toggle theme">
                <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            {{- end }}
        </div>
    </nav>
</header>

<script>
(function() {
    // ============================================================
    // Clock - updates every second
    // ============================================================
    const clockEl = document.getElementById('sb-clock');
    function updateClock() {
        const now = new Date();
        const hh = String(now.getHours()).padStart(2, '0');
        const mm = String(now.getMinutes()).padStart(2, '0');
        if (clockEl) clockEl.textContent = `${hh}:${mm}`;
    }
    updateClock();
    setInterval(updateClock, 1000 * 30); // refresh every 30s (minutes only change slowly)

    // ============================================================
    // Weather - IP-based geolocation + Open-Meteo
    // ============================================================
    const weatherIcon = document.querySelector('.sb-weather-icon');
    const weatherCity = document.querySelector('.sb-weather-city');
    const weatherTemp = document.querySelector('.sb-weather-temp');

    // WMO weather code → emoji icon
    const wmoIcon = (code) => {
        if (code === 0) return '☀';
        if (code <= 2) return '⛅';
        if (code === 3) return '☁';
        if (code >= 45 && code <= 48) return '🌫';
        if (code >= 51 && code <= 57) return '🌦';
        if (code >= 61 && code <= 67) return '🌧';
        if (code >= 71 && code <= 77) return '❄';
        if (code >= 80 && code <= 82) return '🌧';
        if (code >= 85 && code <= 86) return '🌨';
        if (code >= 95) return '⛈';
        return '·';
    };

    async function fetchWeather() {
        // Check session cache (10 min TTL)
        try {
            const cached = sessionStorage.getItem('sb-weather');
            if (cached) {
                const data = JSON.parse(cached);
                if (Date.now() - data.ts < 10 * 60 * 1000) {
                    renderWeather(data);
                    return;
                }
            }
        } catch (e) { /* ignore */ }

        try {
            // Step 1: IP → coords (ipapi.co, no auth, free)
            const geoResp = await fetch('https://ipapi.co/json/');
            if (!geoResp.ok) throw new Error('geo failed');
            const geo = await geoResp.json();
            const lat = geo.latitude;
            const lon = geo.longitude;
            const city = geo.city || '—';

            // Step 2: coords → weather (open-meteo, no auth, free, unlimited)
            const wUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code`;
            const wResp = await fetch(wUrl);
            if (!wResp.ok) throw new Error('weather failed');
            const w = await wResp.json();

            const temp = Math.round(w.current.temperature_2m);
            const code = w.current.weather_code;

            const payload = { city, temp, code, ts: Date.now() };
            sessionStorage.setItem('sb-weather', JSON.stringify(payload));
            renderWeather(payload);
        } catch (e) {
            // fail silently - keep placeholders
            if (weatherIcon) weatherIcon.textContent = '·';
            if (weatherCity) weatherCity.textContent = '';
            if (weatherTemp) weatherTemp.textContent = '';
        }
    }

    function renderWeather({ city, temp, code }) {
        if (weatherIcon) weatherIcon.textContent = wmoIcon(code);
        if (weatherCity) weatherCity.textContent = city;
        if (weatherTemp) weatherTemp.textContent = `${temp}°`;
    }

    fetchWeather();
})();
</script>
