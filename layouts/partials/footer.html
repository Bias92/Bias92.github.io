{{- if not (.Param "hideFooter") }}
<footer class="sb-footer">
    <div class="sb-footer-inner">
        {{- with .Site.Copyright -}}
        <span>{{ . | markdownify }}</span>
        {{- else }}
        <span>&copy; {{ now.Year }} {{ .Site.Title }}</span>
        {{- end }}
    </div>
</footer>
{{- end }}
