<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HepTi - MatMul Partition Methods</title>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f5f5f4;
    --text-primary: #1a1a1a;
    --text-secondary: #6b6b6b;
    --border: #e0e0e0;
    --accent: #2563eb;
    --accent-bg: #eff6ff;
    --device1: #B5D4F4;
    --device2: #C0DD97;
    --radius: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2a2a2a;
      --text-primary: #e8e8e8;
      --text-secondary: #999;
      --border: #3a3a3a;
      --accent: #60a5fa;
      --accent-bg: #1e3a5f;
      --device1: #1e3a5f;
      --device2: #27500A;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 1.5rem;
    max-width: 520px;
    margin: 0 auto;
  }
  .tabs { display: flex; gap: 8px; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .tab {
    padding: 8px 16px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    font-family: inherit;
    transition: all 0.15s;
  }
  .tab.active {
    border-color: var(--accent);
    background: var(--accent-bg);
    color: var(--accent);
  }
  .tab:hover:not(.active) { border-color: var(--text-secondary); }
  .equation {
    text-align: center;
    margin: 1rem 0;
    font-size: 18px;
    font-weight: 500;
  }
  .equation .highlight { color: var(--accent); }
  .card {
    background: var(--bg-secondary);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    margin-bottom: 12px;
  }
  .card-label {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .card-body {
    font-size: 14px;
    color: var(--text-primary);
    line-height: 1.6;
  }
  svg text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>

<div class="tabs" id="tabs"></div>
<div id="svg-area"></div>
<div class="equation" id="eq"></div>
<div id="cards"></div>

<script>
const tabs = ['L row-wise', 'R column-wise', 'Block-wise'];
let active = 0;

const data = [
  {
    cut: '행(m) 방향으로 자른다',
    sum: 'm',
    d1: { label: 'Device 1', aLabel: 'a\u2081 = 4행', note: 'R (전체 복사)' },
    d2: { label: 'Device 2', aLabel: 'a\u2082 = 2행', note: 'R (전체 복사)' },
    r1: '[4, 3]', r2: '[2, 3]',
    eq: 'a\u2081 + a\u2082 = 4 + 2 = 6 = m',
    why: 'L\uc758 \ud589\uc744 \uc798\ub790\ub2e4. \uc6d0\ub798 \ud589\uc774 m=6\uac1c\uc600\uc73c\ub2c8, \uc870\uac01\ub4e4\uc758 \ud589 \uc218\ub97c \ud569\uce58\uba74 \ub2f9\uc5f0\ud788 6 = m\uc774\ub2e4.',
    how: '\uac01 \ub514\ubc14\uc774\uc2a4\ub294 R \uc804\uccb4\uc640 \uc790\uae30 \uc870\uac01\uc744 \uacf1\ud574\uc11c \uacb0\uacfc\uc758 \ub3c5\ub9bd\uc801\uc778 \ud589 \ube14\ub85d\uc744 \ub9cc\ub4e0\ub2e4. \uacb0\uacfc\ub97c \uc704\uc544\ub798\ub85c \uc774\uc5b4\ubd99\uc774\uba74 (all-gather) \uc644\uc131.',
    comm: 'all-gather (concatenate)'
  },
  {
    cut: '열(n) 방향으로 자른다',
    sum: 'n',
    d1: { label: 'Device 1', aLabel: 'a\u2081 = 2열', note: 'R 일부 (2열)' },
    d2: { label: 'Device 2', aLabel: 'a\u2082 = 1열', note: 'R 일부 (1열)' },
    r1: '[6, 2]', r2: '[6, 1]',
    eq: 'a\u2081 + a\u2082 = 2 + 1 = 3 = n',
    why: 'R\uc758 \uc5f4\uc744 \uc798\ub790\ub2e4. \uc6d0\ub798 \uc5f4\uc774 n=3\uac1c\uc600\uc73c\ub2c8, \uc870\uac01\ub4e4\uc758 \uc5f4 \uc218\ub97c \ud569\uce58\uba74 \ub2f9\uc5f0\ud788 3 = n\uc774\ub2e4.',
    how: '\uac01 \ub514\ubc14\uc774\uc2a4\ub294 L \uc804\uccb4\uc640 R \uc870\uac01\uc744 \uacf1\ud574\uc11c \uacb0\uacfc\uc758 \ub3c5\ub9bd\uc801\uc778 \uc5f4 \ube14\ub85d\uc744 \ub9cc\ub4e0\ub2e4. \uacb0\uacfc\ub97c \uc88c\uc6b0\ub85c \uc774\uc5b4\ubd99\uc774\uba74 (all-gather) \uc644\uc131.',
    comm: 'all-gather (concatenate)'
  },
  {
    cut: '공유 차원(k) 방향으로 자른다',
    sum: 'k',
    d1: { label: 'Device 1', aLabel: 'a\u2081 = 3 (k축)', note: 'R 일부 (3행)' },
    d2: { label: 'Device 2', aLabel: 'a\u2082 = 1 (k축)', note: 'R 일부 (1행)' },
    r1: '[6, 3] partial', r2: '[6, 3] partial',
    eq: 'a\u2081 + a\u2082 = 3 + 1 = 4 = k',
    why: '\uacf5\uc720 \ucc28\uc6d0 k\ub97c \uc798\ub790\ub2e4. \uc6d0\ub798 k=4\uc600\uc73c\ub2c8, \uc870\uac01\ub4e4\uc758 k\ub97c \ud569\uce58\uba74 \ub2f9\uc5f0\ud788 4 = k\uc774\ub2e4.',
    how: '\uac01 \ub514\ubc14\uc774\uc2a4\ub294 partial sum [6,3]\uc744 \ub9cc\ub4e0\ub2e4. \uc774\uac74 \ucd5c\uc885 \uacb0\uacfc\uac00 \uc544\ub2c8\ub77c \ubd80\ubd84\ud569\uc774\ubbc0\ub85c, \ub514\ubc14\uc774\uc2a4 \uac04 \ud569\uc0b0 (all-reduce = reduce-scatter + all-gather)\uc774 \ud544\uc694\ud558\ub2e4. \ud1b5\uc2e0 \ube44\uc6a9\uc774 \uac00\uc7a5 \ud06c\ub2e4.',
    comm: 'all-reduce (reduce-scatter + all-gather)'
  }
];

function getColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    bgSec: s.getPropertyValue('--bg-secondary').trim(),
    text: s.getPropertyValue('--text-primary').trim(),
    textSec: s.getPropertyValue('--text-secondary').trim(),
    border: s.getPropertyValue('--border').trim(),
    d1: s.getPropertyValue('--device1').trim(),
    d2: s.getPropertyValue('--device2').trim()
  };
}

function render() {
  const d = data[active];
  const c = getColors();

  document.getElementById('tabs').innerHTML = tabs.map((t, i) =>
    `<button class="tab${i===active?' active':''}" onclick="active=${i};render();">${t}</button>`
  ).join('');

  const svg = `<svg viewBox="0 0 460 260" xmlns="http://www.w3.org/2000/svg" style="width:100%;max-width:460px;display:block;margin:0 auto;">
    <rect x="40" y="10" width="130" height="56" rx="4" fill="${c.bgSec}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="105" y="33" text-anchor="middle" font-size="12" fill="${c.text}" font-weight="500">L [m=6, k=4]</text>
    <text x="105" y="50" text-anchor="middle" font-size="10" fill="${c.textSec}">[6, 4]</text>

    <text x="195" y="44" text-anchor="middle" font-size="18" fill="${c.textSec}" font-weight="500">\u00d7</text>

    <rect x="220" y="10" width="130" height="56" rx="4" fill="${c.bgSec}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="285" y="33" text-anchor="middle" font-size="12" fill="${c.text}" font-weight="500">R [k=4, n=3]</text>
    <text x="285" y="50" text-anchor="middle" font-size="10" fill="${c.textSec}">[4, 3]</text>

    <text x="200" y="97" text-anchor="middle" font-size="12" fill="${c.textSec}">\u2193 ${d.cut}</text>

    <rect x="20" y="118" width="120" height="46" rx="4" fill="${c.d1}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="80" y="138" text-anchor="middle" font-size="11" fill="${c.text}" font-weight="500">${d.d1.label}</text>
    <text x="80" y="153" text-anchor="middle" font-size="10" fill="${c.text}">${d.d1.aLabel}</text>

    <text x="158" y="145" text-anchor="middle" font-size="16" fill="${c.textSec}">\u00d7</text>

    <rect x="175" y="118" width="120" height="46" rx="4" fill="${c.bgSec}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="235" y="145" text-anchor="middle" font-size="10" fill="${c.textSec}">${d.d1.note}</text>

    <text x="315" y="145" text-anchor="start" font-size="11" fill="${c.textSec}">\u2192 ${d.r1}</text>

    <rect x="20" y="178" width="120" height="46" rx="4" fill="${c.d2}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="80" y="198" text-anchor="middle" font-size="11" fill="${c.text}" font-weight="500">${d.d2.label}</text>
    <text x="80" y="213" text-anchor="middle" font-size="10" fill="${c.text}">${d.d2.aLabel}</text>

    <text x="158" y="205" text-anchor="middle" font-size="16" fill="${c.textSec}">\u00d7</text>

    <rect x="175" y="178" width="120" height="46" rx="4" fill="${c.bgSec}" stroke="${c.border}" stroke-width="0.5"/>
    <text x="235" y="205" text-anchor="middle" font-size="10" fill="${c.textSec}">${d.d2.note}</text>

    <text x="315" y="205" text-anchor="start" font-size="11" fill="${c.textSec}">\u2192 ${d.r2}</text>
  </svg>`;

  document.getElementById('svg-area').innerHTML = svg;

  const sumStr = d.eq.replace(new RegExp(d.sum + '$'), `<span class="highlight">${d.sum}</span>`);
  document.getElementById('eq').innerHTML = sumStr;

  document.getElementById('cards').innerHTML = `
    <div class="card">
      <div class="card-label">\uc654 \u03A3a\u1d62 = ${d.sum}\uc778\uac00?</div>
      <div class="card-body">${d.why}</div>
    </div>
    <div class="card">
      <div class="card-label">\ud1b5\uc2e0 \ubc29\uc2dd: ${d.comm}</div>
      <div class="card-body">${d.how}</div>
    </div>
  `;
}

render();
</script>
</body>
</html>
