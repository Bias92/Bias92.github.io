baseURL: "https://bias92.github.io/"  
languageCode: ko
defaultContentLanguage: ko
title: "굉장히 공격적이고 사나운 사람"
theme: "PaperMod"
pagination:
  pagerSize: 10

params:
  env: production
  description: "GPU Systems & Deep Learning Hardware"
  author: "노란토끼"
  defaultTheme: dark
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowToc: true
  TocOpen: true
  comments: true

  homeInfoParams:
    Title: "굉장히 공격적이고 사나운 사람"
    Content: "MLSys · GPU Systems · Deep Learning Hardware"
  socialIcons:
    - name: github
      url: "https://github.com/Bias92"

  assets:
    favicon: "/favicon.ico"
    disableFingerprinting: false

  cover:
    linkFullImages: true

# menu 블록 삭제됨 (scaling-book 스타일: 로고만 있는 네비)
# 원본은 .backups/20260420_195208/hugo.yaml.old 에 보존

outputs:
  home:
    - HTML
    - RSS
    - JSON

markup:
  highlight:
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: dracula
